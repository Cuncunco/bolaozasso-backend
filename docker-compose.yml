services:
  bolaozasso-pg:
    image: postgres:15-alpine
    container_name: bolaozasso-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    networks:
      - bolaozasso-network

volumes:
  postgres-data:

networks:
  bolaozasso-network:
    driver: bridge